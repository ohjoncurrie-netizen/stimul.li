server {
    listen 80;
    listen [::]:80;
    server_name stimul.li www.stimul.li;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://stimul.li$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.stimul.li;

    ssl_certificate /etc/letsencrypt/live/stimul.li/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stimul.li/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/stimul.li/chain.pem;

    return 301 https://stimul.li$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stimul.li;

    ssl_certificate /etc/letsencrypt/live/stimul.li/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stimul.li/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/stimul.li/chain.pem;

    root /var/www/stimul.li;
    index index.html;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
